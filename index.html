  <!-- Liquid-glass SVG displacement filter. Referenced by .glass-card / .liquid-glass /
       .glass-premium via `backdrop-filter: url(#liquid-glass-filter)`. The feTurbulence +
       feDisplacementMap combo bends the blurred backdrop so the pane refracts light like
       actual glass. Chromium/Safari honor it; Firefox ignores (falls back to blur). -->
  <svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden" focusable="false">
    <defs>
      <filter id="liquid-glass-filter" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="turbulence"/>
        <feGaussianBlur in="turbulence" stdDeviation="2" result="smoothNoise"/>
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="70" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>
